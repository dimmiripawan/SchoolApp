<div class="register-container">
  <h2>Register</h2>

  <form (ngSubmit)="onRegister()" #regForm="ngForm">

    <input 
      type="text" 
      placeholder="Username"
      name="username"
      [(ngModel)]="username"
      required
      #u="ngModel"
    />
    <div *ngIf="u.invalid && u.touched" class="error">
      Username is required
    </div>

    <input 
      type="email" 
      placeholder="Email"
      name="email"
      [(ngModel)]="email"
      required
      #e="ngModel"
    />
    <div *ngIf="e.invalid && e.touched" class="error">
      Valid email is required
    </div>

    <input 
      type="password" 
      placeholder="Password"
      name="password"
      [(ngModel)]="password"
      required
    />

    <input 
      type="password" 
      placeholder="Confirm Password"
      name="confirmPassword"
      [(ngModel)]="confirmPassword"
      required
    />

    <div *ngIf="password !== confirmPassword && confirmPassword" class="error">
      Passwords do not match
    </div>

    <button type="submit">Register</button>
  </form>

  <p>
    Already have an account?
    <a routerLink="/">Login</a>
  </p>
</div>
